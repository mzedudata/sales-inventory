<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mzedu Data - Sales & Inventory Beast</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for clean dashboard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-chart-line"></i>
                <h2>Mzedu Data</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="#"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
                <a href="#"><i class="fa-solid fa-cart-shopping"></i> Sales</a>
            </nav>
        </aside>

        <!-- Main Dashboard Area -->
        <main class="main-content">
            <header class="top-header">
                <h1>Sales & Inventory Dashboard</h1>
                <div class="user-profile">
                    <span class="badge">PRO</span>
                    <span class="user-name">Admin</span>
                </div>
            </header>

            <!-- Metrics Cards -->
            <section class="metrics-grid">
                <div class="card card-revenue">
                    <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
                    <div class="card-info">
                        <h3>Total Revenue</h3>
                        <p id="total-revenue">$0.00</p>
                    </div>
                </div>
                <div class="card card-stock">
                    <div class="card-icon"><i class="fa-solid fa-box"></i></div>
                    <div class="card-info">
                        <h3>Total Items</h3>
                        <p id="total-items">0</p>
                    </div>
                </div>
                <div class="card card-alerts">
                    <div class="card-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="card-info">
                        <h3>Low Stock Alerts</h3>
                        <p id="low-stock-count" class="alert-text">0</p>
                    </div>
                </div>
            </section>

            <!-- Action Controls & Forms -->
            <section class="dashboard-body">
                <!-- Add Product Form -->
                <div class="panel form-panel">
                    <h2><i class="fa-solid fa-plus"></i> Add New Product</h2>
                    <form id="product-form">
                        <div class="form-group">
                            <label for="prod-name">Product Name</label>
                            <input type="text" id="prod-name" placeholder="e.g., iPhone 15 Pro" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="prod-qty">Quantity</label>
                                <input type="number" id="prod-qty" min="0" placeholder="0" required>
                            </div>
                            <div class="form-group">
                                <label for="prod-price">Price ($)</label>
                                <input type="number" id="prod-price" min="0" step="0.01" placeholder="0.00" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Add Product</button>
                    </form>
                </div>

                <!-- Live Inventory Table -->
                <div class="panel table-panel">
                    <h2><i class="fa-solid fa-list"></i> Real-time Stock Levels</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Product Name</th>
                                    <th>Quantity</th>
                                    <th>Unit Price</th>
                                    <th>Total Value</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-list">
                                <!-- Dynamic rows go here via JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
